name: Build and release portmap
on:
  push:
    branches:
      - main

env:
  VERSION: ''

jobs:
  build-and-upload:
    name: Build and upload
    runs-on: ubuntu-latest

    strategy:
      matrix:
        goarch: [amd64, arm, arm64, 386]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        run: |
          version=$(grep -o 'var version = "[^"]*"' main.go | cut -d'"' -f2)
          echo "VERSION=$version" >> $GITHUB_ENV

      - name: Set up Go
        uses: actions/setup-go@v3
        with:
          go-version: '1.23.4'

      - name: Build
        run: |
          GOOS=linux GOARCH=${{ matrix.goarch }} go build -ldflags="-s -w" -o ${{ github.workspace }}/build/portmap-linux-${{ matrix.goarch }} .
          echo "ASSET=${{ github.workspace }}/build/portmap-linux-${{ matrix.goarch }}" >> $GITHUB_ENV

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ${{ env.ASSET }}
          tag_name: ${{ env.VERSION }}

  tag-commit:
    name: Tag commit
    runs-on: ubuntu-latest
    needs: build-and-upload

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        run: |
          version=$(grep -o 'var version = "[^"]*"' main.go | cut -d'"' -f2)
          echo "VERSION=$version" >> $GITHUB_ENV

      - name: Tag commit
        run: |
          git tag ${{ env.VERSION }}
          git push origin ${{ env.VERSION }}
